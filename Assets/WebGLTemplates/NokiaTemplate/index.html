<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | {{{ PRODUCT_NAME }}}</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
#if SHOW_DIAGNOSTICS
    <link rel="stylesheet" href="<<<TemplateData/diagnostics.css>>>">
    <script src="<<<TemplateData/diagnostics.js>>>"></script>
#endif
    <style>
      body {
          margin: 0;
          overflow: hidden;
          height: 100vh;
          background-color: black;
      }

      /* Override the template's styles */
      #unity-container.unity-desktop {
          top: 29% !important; /* Change this number (0-100) to move up/down */
          transform: translate(-50%, 0) !important;
          height: 16vh; /* Change this number to adjust size */
          aspect-ratio: 84/48;
      }

      canvas {
          width: 100%;
          height: 100%;
          image-rendering: pixelated; /* Ensures sharp rendering for pixel art */
      }

      #touch-controls {
          position: fixed;
          top: 0;
          left: 50%;
          transform: translate(-50%, 0);
          height: 100vh;
          /* Match background image aspect ratio */
          aspect-ratio: 0.5625;
          pointer-events: none; /* Allow clicks to pass through container */
      }

      .touch-button {
          position: absolute;
          width: 12vh;
          height: 7vh;
          background: rgba(255, 255, 255, 0);
          border-radius: 40%;
          pointer-events: auto; /* Re-enable pointer events for buttons */
          cursor: pointer;
          -webkit-tap-highlight-color: transparent; /* Remove tap highlight on mobile */
          touch-action: manipulation; /* Disable double-tap zoom */
          transform: translate(-50%, -50%)
      }
    </style>
  </head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width={{{ WIDTH }}} height={{{ HEIGHT }}} tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
    </div>
    <div id="touch-controls">
      <!-- Row 1 -->
      <div id="digit2-button" class="touch-button" style="left: calc(50vh * 0.5625); top: 70%;"></div>
      <div id="digit3-button" class="touch-button" style="left: calc(72vh * 0.5625); top: 68.5%;"></div>
      
      <!-- Row 2 -->
      <div id="q-button" class="touch-button" style="left: calc(28vh * 0.5625); top: 75.5%;"></div>
      <div id="w-button" class="touch-button" style="left: calc(50vh * 0.5625); top: 77%;"></div>
      <div id="e-button" class="touch-button" style="left: calc(72vh * 0.5625); top: 75.5%;"></div>
      
      <!-- Row 3 -->
      <div id="a-button" class="touch-button" style="left: calc(28vh * 0.5625); top: 82.5%;"></div>
      <div id="s-button" class="touch-button" style="left: calc(50vh * 0.5625); top: 84%;"></div>
      <div id="d-button" class="touch-button" style="left: calc(72vh * 0.5625); top: 82.5%;"></div>
      
      <!-- Row 4 -->
      <div id="x-button" class="touch-button" style="left: calc(50vh * 0.5625); top: 91%;"></div>
    </div>
    <script>
      // Handle touch/mouse events for virtual buttons
      function setupTouchControls() {
        const buttons = {
          'w': { element: document.getElementById('w-button'), key: 'w' },
          'a': { element: document.getElementById('a-button'), key: 'a' },
          's': { element: document.getElementById('s-button'), key: 's' },
          'd': { element: document.getElementById('d-button'), key: 'd' },
          'q': { element: document.getElementById('q-button'), key: 'q' },
          'e': { element: document.getElementById('e-button'), key: 'e' },
          'x': { element: document.getElementById('x-button'), key: 'x' },
          'digit2': { element: document.getElementById('digit2-button'), key: '2' },
          'digit3': { element: document.getElementById('digit3-button'), key: '3' }
        };
        
        function simulateKeyEvent(key, isDown) {
          const eventType = isDown ? 'keydown' : 'keyup';
          let keyCode, code;
          
          // Map key to proper keyCode and code
          switch(key.toLowerCase()) {
            case 'w': keyCode = 87; code = 'KeyW'; break;
            case 'a': keyCode = 65; code = 'KeyA'; break;
            case 's': keyCode = 83; code = 'KeyS'; break;
            case 'd': keyCode = 68; code = 'KeyD'; break;
            case 'q': keyCode = 81; code = 'KeyQ'; break;
            case 'e': keyCode = 69; code = 'KeyE'; break;
            case 'x': keyCode = 88; code = 'KeyX'; break;
            case '2': keyCode = 50; code = 'Digit2'; break;
            case '3': keyCode = 51; code = 'Digit3'; break;
            default: return;
          }

          // Create and dispatch a keyboard event
          const event = new KeyboardEvent(eventType, {
            key: key,
            code: code,
            keyCode: keyCode,
            which: keyCode,
            bubbles: true,
            cancelable: true,
            composed: true,
            repeat: false
          });
          
          // Dispatch to both document and window to ensure Unity's Input system catches it
          document.dispatchEvent(event);
          window.dispatchEvent(event);
          
          // Also update the web input state if it's the W key
          if (key.toLowerCase() === 'w' && window.setWKeyState) {
            window.setWKeyState(isDown);
          }
        }

        Object.values(buttons).forEach(button => {
          if (button.element) {
            // Mouse events
            button.element.addEventListener('mousedown', () => simulateKeyEvent(button.key, true));
            button.element.addEventListener('mouseup', () => simulateKeyEvent(button.key, false));
            
            // Touch events
            button.element.addEventListener('touchstart', (e) => {
              e.preventDefault(); // Prevent scrolling
              simulateKeyEvent(button.key, true);
            });
            button.element.addEventListener('touchend', () => simulateKeyEvent(button.key, false));
            button.element.addEventListener('touchcancel', () => simulateKeyEvent(button.key, false));
          }
        });

        // Handle touch/mouse release outside buttons
        document.addEventListener('mouseup', () => {
          Object.values(buttons).forEach(button => simulateKeyEvent(button.key, false));
        });
        document.addEventListener('touchend', () => {
          Object.values(buttons).forEach(button => simulateKeyEvent(button.key, false));
        });
        document.addEventListener('touchcancel', () => {
          Object.values(buttons).forEach(button => simulateKeyEvent(button.key, false));
        });
      }

      function updateColors(background, foreground) {
        console.log('Updating colors:', background, foreground);
        
        // Create a container div for the background image if it doesn't exist
        let bgContainer = document.getElementById('background-container');
        if (!bgContainer) {
          bgContainer = document.createElement('div');
          bgContainer.id = 'background-container';
          bgContainer.style.position = 'fixed';
          bgContainer.style.top = '0';
          bgContainer.style.left = '0';
          bgContainer.style.width = '100%';
          bgContainer.style.height = '100%';
          bgContainer.style.zIndex = '-1';
          document.body.insertBefore(bgContainer, document.body.firstChild);
        }
        
        // Set the background color
        document.body.style.backgroundColor = background;
        
        // Create canvas if needed
        let canvas = document.getElementById('color-processor');
        if (!canvas) {
          canvas = document.createElement('canvas');
          canvas.id = 'color-processor';
          canvas.style.display = 'none';
          document.body.appendChild(canvas);
        }
        
        // Load and process image
        const img = new Image();
        img.onload = () => {
          canvas.width = img.width;
          canvas.height = img.height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const data = imageData.data;
          
          // Convert foreground color from hex to RGB
          const fgColor = foreground.match(/[0-9a-f]{2}/gi).map(c => parseInt(c, 16));
          
          // Process pixels - replace RGB while keeping alpha
          for (let i = 0; i < data.length; i += 4) {
            data[i] = fgColor[0];   // R
            data[i+1] = fgColor[1]; // G
            data[i+2] = fgColor[2]; // B
            // Alpha at data[i+3] is preserved
          }
          
          ctx.putImageData(imageData, 0, 0);
          
          // Update background container with processed image
          bgContainer.style.backgroundImage = `url(${canvas.toDataURL()})`;
          bgContainer.style.backgroundRepeat = 'no-repeat';
          bgContainer.style.backgroundPosition = 'center center';
          bgContainer.style.backgroundSize = 'auto 100vh';
        };
        img.src = '3310.png';
      }

      var canvas = document.querySelector("#unity-canvas");

      // Shows a temporary message banner/ribbon for a few seconds, or
      // a permanent error message on top of the canvas if type=='error'.
      // If type=='warning', a yellow highlight color is used.
      // Modify or remove this function to customize the visually presented
      // way that non-critical warnings and error messages are presented to the
      // user.
      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/{{{ LOADER_FILENAME }}}";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/{{{ DATA_FILENAME }}}",
        frameworkUrl: buildUrl + "/{{{ FRAMEWORK_FILENAME }}}",
#if USE_THREADS
        workerUrl: buildUrl + "/{{{ WORKER_FILENAME }}}",
#endif
#if USE_WASM
        codeUrl: buildUrl + "/{{{ CODE_FILENAME }}}",
#endif
#if SYMBOLS_FILENAME
        symbolsUrl: buildUrl + "/{{{ SYMBOLS_FILENAME }}}",
#endif
        streamingAssetsUrl: "StreamingAssets",
        companyName: {{{ JSON.stringify(COMPANY_NAME) }}},
        productName: {{{ JSON.stringify(PRODUCT_NAME) }}},
        productVersion: {{{ JSON.stringify(PRODUCT_VERSION) }}},
        showBanner: unityShowBanner,
      };

      // By default, Unity keeps WebGL canvas render target size matched with
      // the DOM size of the canvas element (scaled by window.devicePixelRatio)
      // Set this to false if you want to decouple this synchronization from
      // happening inside the engine, and you would instead like to size up
      // the canvas DOM size and WebGL render target sizes yourself.
      // config.matchWebGLToCanvasSize = false;

      // If you would like all file writes inside Unity Application.persistentDataPath
      // directory to automatically persist so that the contents are remembered when
      // the user revisits the site the next time, uncomment the following line:
      // config.autoSyncPersistentDataPath = true;
      // This autosyncing is currently not the default behavior to avoid regressing
      // existing user projects that might rely on the earlier manual
      // JS_FileSystem_Sync() behavior, but in future Unity version, this will be
      // expected to change.

      if (/iPhoneNO|iPadNO|iPodNO|AndroidNO/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:

        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";

        // To lower canvas resolution on mobile devices to gain some
        // performance, uncomment the following line:
        // config.devicePixelRatio = 1;

#if SHOW_DIAGNOSTICS
        // position the diagnostics icon in the corner on the canvas
        let diagnostics_icon = document.getElementById("diagnostics-icon");
        diagnostics_icon.style.position = "fixed";
        diagnostics_icon.style.bottom = "10px";
        diagnostics_icon.style.right = "0px";
        canvas.after(diagnostics_icon);
#endif

      } else {
        // Desktop style: Canvas size is handled by CSS
        canvas.className = "unity-desktop";
      }

#if BACKGROUND_FILENAME
      canvas.style.background = "url('" + buildUrl + "/{{{ BACKGROUND_FILENAME.replace(/'/g, '%27') }}}') center / cover";
#endif
      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          // Initialize touch controls after Unity is loaded
          setupTouchControls();
                document.querySelector("#unity-loading-bar").style.display = "none";
#if SHOW_DIAGNOSTICS
                document.getElementById("diagnostics-icon").onclick = () => {
                  unityDiagnostics.openDiagnosticsDiv(unityInstance.GetMetricsInfo);
                };
#endif
#if DEVELOPMENT_PLAYER
                // Unloading web content from DOM so that browser GC can run can be tricky to get right.
                // This code snippet shows how to correctly implement a Unity content Unload mechanism to a web page.

                // Unloading Unity content enables a web page to reclaim the memory used by Unity, e.g. for
                // the purpose of later loading another Unity content instance on the _same_ web page.

                // When using this functionality, take caution to carefully make sure to clear all JavaScript code,
                // DOM element and event handler references to the old content you may have retained, or
                // otherwise the browser's garbage collector will be unable to reclaim the old page.

                // N.b. Unity content does _not_ need to be manually unloaded when the user is navigating away from
                // the current page to another web page. The browser will take care to clear memory of old visited
                // pages automatically. This functionality is only needed if you want to switch between loading
                // multiple Unity builds on a single web page.
                var quit = document.createElement("button");
                quit.style = "margin-left: 5px; background-color: lightgray; border: none; padding: 5px; cursor: pointer";
                quit.innerHTML = "Unload";
                document.querySelector("#unity-build-title").appendChild(quit);
                quit.onclick = () => {
                  // Quit Unity application execution
                  unityInstance.Quit().then(() => {
                    // Remove DOM elements from the page so GC can run
                    document.querySelector("#unity-container").remove();
                    canvas = null;
                    // Remover script elements from the page so GC can run
                    script.remove();
                    script = null;
                  });
                };
#endif
              }).catch((message) => {
                alert(message);
              });
            };

      document.body.appendChild(script);

    </script>
  </body>
</html>
